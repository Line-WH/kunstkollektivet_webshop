<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="utf-8">

    <title>Kurv | KunstKollektivet</title>

    <meta name="robots" content="noindex, follow">
    <meta name="author" content="KunstKollektivet">
    <meta name="copyright" content="KunstKollektivet">

    <link href="css/styles.css" rel="stylesheet" type="text/css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
            href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Merriweather+Sans:ital,wght@0,300..800;1,300..800&display=swap"
            rel="stylesheet"
    >

    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
<a href="#main-content" class="skip-link">Spring til indhold</a>

<div id="site-header" class="sticky-top"></div>

<main id="main-content" class="container py-5">
    <header>
        <h1>Din kurv</h1>
    </header>

    <section id="cart-content" class="mt-4" aria-labelledby="cart-items-title">
        <h2 id="cart-items-title" class="visually-hidden">Produkter i kurven</h2>

        <div
                id="cart-items"
                class="cart-page__items"
                aria-live="polite"
                aria-relevant="additions removals text"
        ></div>
    </section>

    <div class="border-top pt-4 mt-4">
        <p class="fs-4 fw-bold">
            Total: <span id="cart-total">0 kr.</span>
        </p>

        <a href="checkout.html" class="btn btn-is btn-lg rounded-5">
            Gå til betaling
        </a>
    </div>
</main>

<div id="site-footer"></div>

<script src="js/cartStorage.js"></script>
<script src="js/includes.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/cart.js"></script>
</body>
</html>
