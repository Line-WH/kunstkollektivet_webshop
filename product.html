<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="utf-8">

    <title>Produkt | KunstKollektivet</title>

    <meta name="robots" content="All">
    <meta name="author" content="KunstKollektivet">
    <meta name="copyright" content="KunstKollektivet">

    <link href="css/styles.css" rel="stylesheet" type="text/css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
            href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Merriweather+Sans:ital,wght@0,300..800;1,300..800&display=swap"
            rel="stylesheet"
    >

    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<div id="site-header" class="sticky-top"></div>

<main id="main-content" class="product-page">

    <section class="product-layout container py-3 py-lg-5">

        <div class="row g-4 g-lg-5 align-items-start">

            <!-- Product carousel -->
            <div class="col-12 col-lg-7">

                <section class="product-gallery" aria-label="Produktbilleder og video">

                    <div
                            id="productMediaCarousel"
                            class="carousel slide product-carousel"
                            data-bs-touch="true"
                            data-bs-interval="false"
                    >

                        <div
                                id="product-carousel-indicators"
                                class="carousel-indicators"
                        >
                            <!-- Injected by product.js -->
                        </div>

                        <div
                                id="product-carousel-inner"
                                class="carousel-inner"
                        >
                            <!-- Injected by product.js -->
                        </div>

                        <button
                                class="carousel-control-prev"
                                type="button"
                                data-bs-target="#productMediaCarousel"
                                data-bs-slide="prev"
                                aria-label="Forrige billede"
                        >
                            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        </button>

                        <button
                                class="carousel-control-next"
                                type="button"
                                data-bs-target="#productMediaCarousel"
                                data-bs-slide="next"
                                aria-label="Næste billede"
                        >
                            <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        </button>

                    </div>

                </section>

            </div>

            <!-- Buy area -->
            <div class="col-12 col-lg-5">

                <aside class="product-purchase" aria-labelledby="product-title">

                    <p
                            id="product-category"
                            class="product-purchase__eyebrow"
                    >
                        <!-- Injected category -->
                    </p>

                    <h1
                            id="product-title"
                            class="product-purchase__title"
                    >
                        <!-- Injected title -->
                    </h1>

                    <p
                            id="product-artist"
                            class="product-purchase__artist"
                    >
                        <!-- Injected artist -->
                    </p>

                    <p
                            id="product-price"
                            class="product-purchase__price"
                    >
                        <!-- Price calculated by product.js -->
                    </p>

                    <form class="product-form">

                        <div class="mb-3">
                            <label for="product-size" class="form-label">
                                Størrelse
                            </label>

                            <select
                                    id="product-size"
                                    class="form-select"
                                    name="size"
                            >
                                <option value="A4" data-price="400" selected>
                                    A4 — 400 kr
                                </option>

                                <option value="A3" data-price="550">
                                    A3 — 550 kr
                                </option>

                                <option value="50x70" data-price="700">
                                    50 × 70 cm — 700 kr
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="product-paper" class="form-label">
                                Papirtype
                            </label>

                            <select
                                    id="product-paper"
                                    class="form-select"
                                    name="paper"
                            >
                                <option value="mat-fine-art" selected>
                                    Mat fine art papir
                                </option>

                                <option value="strukturpapir">
                                    Let strukturpapir
                                </option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label for="product-frame" class="form-label">
                                Ramme
                            </label>

                            <select
                                    id="product-frame"
                                    class="form-select"
                                    name="frame"
                            >
                                <option value="uden-ramme" data-price-modifier="0" selected>
                                    Uden ramme
                                </option>

                                <option value="sort-ramme" data-price-modifier="250">
                                    Sort ramme + 250 kr
                                </option>

                                <option value="eg-ramme" data-price-modifier="300">
                                    Eg ramme + 300 kr
                                </option>
                            </select>
                        </div>

                        <button
                                type="button"
                                id="add-to-cart-button"
                                class="btn btn-is text-rust product-form__button fw-bold"
                        >
                            Læg i kurven
                        </button>

                    </form>

                    <ul class="product-purchase__notes">
                        <li>Printet lokalt i Danmark</li>
                        <li>Produceret på kvalitetspapir</li>
                        <li>Kunstneren beholder rettighederne</li>
                    </ul>

                </aside>

            </div>

        </div>

        <!-- Product text -->
        <div class="row mt-4 mt-lg-5">

            <div class="col-12 col-lg-7">

                <div class="product-copy">

                    <section class="product-copy__section">
                        <h2>Beskrivelse af værket</h2>

                        <p id="product-description">
                            <!-- Injected product description -->
                        </p>
                    </section>

                    <section class="product-copy__section">
                        <h2>Om kunstneren</h2>

                        <p id="product-artist-description">
                            <!-- Injected artist description -->
                        </p>
                    </section>

                    <details class="product-foldout">
                        <summary>Materialer og levering</summary>

                        <div class="product-foldout__content">
                            <p id="product-materials">
                                <!-- Injected materials and delivery text -->
                            </p>
                        </div>
                    </details>

                </div>

            </div>

        </div>

    </section>

</main>

<div id="site-footer"></div>

<script src="js/includes.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/products.js"></script>
<script src="js/product.js"></script>

</body>
</html>
