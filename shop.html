<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="utf-8">

    <title>Alle kunstprints | KunstKollektivet</title>

    <meta
            name="description"
            content="Udforsk kuraterede kunstprints fra KunstKollektivet. Find plakater og prints skabt af mennesker, udvalgt med omtanke og printet lokalt."
    >

    <meta name="robots" content="index, follow">
    <meta name="author" content="KunstKollektivet">
    <meta name="copyright" content="KunstKollektivet">

    <link rel="canonical" href="https://kunstkollektivet.dk/shop.html">

    <meta property="og:site_name" content="KunstKollektivet">
    <meta property="og:title" content="Alle kunstprints | KunstKollektivet">
    <meta property="og:description" content="Udforsk kuraterede kunstprints skabt af mennesker og udvalgt med omtanke.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kunstkollektivet.dk/shop.html">
    <meta property="og:image" content="https://kunstkollektivet.dk/images/og-image.jpg">

    <link href="css/styles.css" rel="stylesheet" type="text/css">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
            href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Merriweather+Sans:ital,wght@0,300..800;1,300..800&display=swap"
            rel="stylesheet"
    >

    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<a href="#main-content" class="skip-link">Spring til indhold</a>

<div id="site-header" class="sticky-top"></div>

<main id="main-content" class="shop-page">
    <header class="shop-page__header container py-5" aria-labelledby="shop-page-title">

        <h1 id="shop-page-title" class="fw-bold">Alle kunstprints</h1>

        <h2 class="fw-light h5">
            5 tilgængelige
        </h2>
    </header>

    <section class="shop-page__products container pb-5" aria-labelledby="shop-products-title">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-end gap-3 mb-4">
            <div>
                <h2 id="shop-products-title" class="mb-2">Prints i webshoppen</h2>
                <p id="shop-products-description" class="shop-page__products-intro mb-0">
                    Vælg et print for at se størrelser, pris og mere information om værket.
                </p>
            </div>
        </div>

        <div
                id="product-grid"
                class="row g-4"
                aria-describedby="shop-products-description"
        >
            <!-- Produkter bliver indsat med shop.js -->
        </div>

        <noscript>
            <p class="mt-4">
                Produkterne kræver JavaScript for at blive vist i denne prototype.
            </p>
        </noscript>
    </section>
</main>

<div id="site-footer"></div>

<script src="js/products.js"></script>
<script src="js/shop.js"></script>
<script src="js/cartStorage.js"></script>
<script src="js/includes.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
