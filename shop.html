<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="utf-8">

    <title>Shop | KunstKollektivet</title>

    <meta name="robots" content="All">
    <meta name="author" content="KunstKollektivet">
    <meta name="copyright" content="KunstKollektivet">

    <link href="css/styles.css" rel="stylesheet" type="text/css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
            href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Merriweather+Sans:ital,wght@0,300..800;1,300..800&display=swap"
            rel="stylesheet"
    >

    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<div id="site-header" class="sticky-top"></div>

<main id="main-content">

    <section class="shop-hero container py-4 py-md-5">

        <div class="row">
            <div class="col-12 col-lg-8">
                <h1 class="shop-hero__eyebrow fw-bold">Alle print</h1>

                <p class="shop-hero__title">
                    5 tilgængelige
                </p>
            </div>
        </div>

    </section>

    <section class="shop-products container pb-5" aria-labelledby="shop-products-title">

        <h2 id="shop-products-title" class="visually-hidden">
            Produkter
        </h2>

        <div
                id="product-grid"
                class="row g-4"
        >
            <!-- Product cards are injected here by shop.js -->
        </div>

    </section>

</main>

<div id="site-footer"></div>

<script src="js/includes.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/products.js"></script>
<script src="js/shop.js"></script>

</body>
</html>
