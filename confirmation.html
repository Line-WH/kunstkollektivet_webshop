<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="utf-8">

    <title>Bekræftelse | KunstKollektivet</title>

    <meta name="robots" content="All">
    <meta name="author" content="KunstKollektivet">
    <meta name="copyright" content="KunstKollektivet">

    <link href="css/styles.css" rel="stylesheet" type="text/css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
            href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Merriweather+Sans:ital,wght@0,300..800;1,300..800&display=swap"
            rel="stylesheet"
    >

    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<div id="site-header" class="sticky-top"></div>

<main id="main-content" class="confirmation-page py-5">
    <section class="container">

        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">

                <section class="confirmation-card text-center">

                    <div class="confirmation-card__icon" aria-hidden="true">
                        ✓
                    </div>

                    <h1 class="confirmation-card__title">
                        Tak for din ordre!
                    </h1>

                    <p class="confirmation-card__intro">
                        Vi har modtaget din ordre og sender en bekræftelse til din mail.
                    </p>

                    <section class="checkout-order text-start my-4" aria-labelledby="confirmation-order-title">
                        <h2 id="confirmation-order-title" class="checkout-order__title">
                            Din Ordre
                        </h2>

                        <div id="confirmation-order-items">
                            <!-- Injected by confirmation.js -->
                        </div>

                        <div class="checkout-order__summary">
                            <div class="checkout-order__line">
                                <span>Subtotal</span>
                                <span id="confirmation-subtotal">0 kr.</span>
                            </div>

                            <div class="checkout-order__line">
                                <span>Fragt</span>
                                <span id="confirmation-shipping">gratis</span>
                            </div>

                            <div class="checkout-order__line checkout-order__line--total">
                                <span>Total</span>
                                <span id="confirmation-total">0 kr.</span>
                            </div>
                        </div>
                    </section>

                    <p class="confirmation-card__delivery">
                        Din ordre sendes inden for 2–3 hverdage. Du vil modtage en sporingsmail, når din ordre er afsendt.
                    </p>

                    <a href="shop.html" class="btn btn-is text-rust confirmation-card__button">
                        Fortsæt med at handle
                    </a>

                </section>

            </div>
        </div>

    </section>
</main>

<div id="site-footer"></div>

<script src="js/cartStorage.js"></script>
<script src="js/includes.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/confirmation.js"></script>

</body>
</html>
